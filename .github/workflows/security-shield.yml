name: 🛡️ Security Shield — Layer 3

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    # Quét tự động mỗi ngày lúc 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: TruffleHog Secret Scanning
  # ─────────────────────────────────────────────────────────
  secret-scan:
    name: 🔍 TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Lấy toàn bộ history để quét

      - name: Run TruffleHog (Full Scan)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: >
            --only-verified
            --no-update
            --fail

      - name: Notify if secrets found
        if: failure()
        run: |
          echo "::error::🚨 TruffleHog đã phát hiện SECRET trong commit này!"
          echo "::error::Hãy thu hồi token/key ngay lập tức và xóa khỏi git history."

  # ─────────────────────────────────────────────────────────
  # JOB 2: Dependency Vulnerability Scan
  # ─────────────────────────────────────────────────────────
  dependency-audit:
    name: 📦 Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if package.json exists
        id: check-pkg
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check-pkg.outputs.exists == 'true'
        run: npm ci --ignore-scripts

      - name: Run npm audit
        if: steps.check-pkg.outputs.exists == 'true'
        run: |
          npm audit --audit-level=high --json > audit-results.json || true
          # Đếm lỗ hổng nghiêm trọng
          CRITICAL=$(cat audit-results.json | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              vulns = data.get('metadata', {}).get('vulnerabilities', {})
              print(vulns.get('critical', 0) + vulns.get('high', 0))
          except: print(0)
          " 2>/dev/null || echo "0")
          echo "Lỗ hổng Critical+High: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::warning::⚠️ Phát hiện $CRITICAL lỗ hổng Critical/High trong dependencies!"
          fi

  # ─────────────────────────────────────────────────────────
  # JOB 3: Code Security Analysis (CodeQL)
  # ─────────────────────────────────────────────────────────
  code-analysis:
    name: 🔬 CodeQL Static Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────────────────────
  # JOB 4: Security Headers & Config Check
  # ─────────────────────────────────────────────────────────
  security-config-check:
    name: ⚙️ Security Config Validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for sensitive files accidentally committed
        run: |
          FOUND=0
          SENSITIVE_FILES=(
            ".env" ".env.local" ".env.production"
            "config.json" "secrets.json"
            "*.pem" "*.key" "*.p12"
            "id_rsa" "id_ed25519"
          )
          for pattern in "${SENSITIVE_FILES[@]}"; do
            FILES=$(git ls-files "$pattern" 2>/dev/null || true)
            if [[ -n "$FILES" ]]; then
              echo "::error::🚨 File nhạy cảm đã bị commit: $FILES"
              FOUND=1
            fi
          done
          if [[ $FOUND -eq 1 ]]; then
            echo "::error::Chạy 'git rm --cached <file>' để gỡ file nhạy cảm!"
            exit 1
          fi
          echo "✅ Không tìm thấy file nhạy cảm nào được commit."

      - name: Validate .gitignore completeness
        run: |
          REQUIRED=(".env" "node_modules" "*.key" "*.pem")
          MISSING=()
          for entry in "${REQUIRED[@]}"; do
            if ! grep -q "$entry" .gitignore 2>/dev/null; then
              MISSING+=("$entry")
            fi
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::warning::⚠️ .gitignore thiếu các mục: ${MISSING[*]}"
          else
            echo "✅ .gitignore đầy đủ."
          fi

  # ─────────────────────────────────────────────────────────
  # JOB 5: Security Summary Report
  # ─────────────────────────────────────────────────────────
  security-report:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-audit, security-config-check]
    if: always()
    steps:
      - name: Generate Security Report
        run: |
          echo "## 🛡️ P.A.S.T WORKSPACE — Security Shield Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Công cụ | Trạng thái |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|------------|" >> $GITHUB_STEP_SUMMARY

          # Layer 2
          if [ "${{ needs.secret-scan.result }}" == "success" ]; then
            echo "| 🔍 Secret Scan | TruffleHog | ✅ Sạch |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Secret Scan | TruffleHog | ❌ Phát hiện secret! |" >> $GITHUB_STEP_SUMMARY
          fi

          # Dependencies
          if [ "${{ needs.dependency-audit.result }}" == "success" ]; then
            echo "| 📦 Dependencies | npm audit | ✅ An toàn |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📦 Dependencies | npm audit | ⚠️ Có lỗ hổng |" >> $GITHUB_STEP_SUMMARY
          fi

          # Config
          if [ "${{ needs.security-config-check.result }}" == "success" ]; then
            echo "| ⚙️ Config Check | Custom | ✅ Hợp lệ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚙️ Config Check | Custom | ❌ Có vấn đề |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🕐 Báo cáo được tạo lúc: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
